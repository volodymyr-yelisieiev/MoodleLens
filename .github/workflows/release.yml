name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks | grep -i macos

      - name: Import signing certificate
        env:
          MOODLELENS_CERTIFICATE_P12: ${{ secrets.MOODLELENS_CERTIFICATE_P12 }}
          MOODLELENS_CERTIFICATE_PASSWORD: ${{ secrets.MOODLELENS_CERTIFICATE_PASSWORD }}
          MOODLELENS_KEYCHAIN_PASSWORD: ${{ secrets.MOODLELENS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MOODLELENS_CERTIFICATE_P12}" ]; then
            echo "No signing certificate secret configured; release will be ad-hoc signed."
            exit 0
          fi
          KEYCHAIN_PASSWORD="${MOODLELENS_KEYCHAIN_PASSWORD:-moodlelens-ci-keychain}"
          KEYCHAIN_PATH="$RUNNER_TEMP/moodlelens-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/moodlelens-certificate.p12"
          printf '%s' "$MOODLELENS_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MOODLELENS_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install verification tools
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew install ripgrep
          fi

      - name: Run tests
        run: |
          xcodebuild test \
            -project MoodleLens.xcodeproj \
            -scheme MoodleLens \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Run local verification
        run: scripts/verify-local.sh

      - name: Generate changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..HEAD"
          else
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
          fi
          git log --pretty=format:"- %s" "$RANGE" > changelog.md
          if [ ! -s changelog.md ]; then
            echo "- Maintenance release" > changelog.md
          fi

      - name: Build release artifacts
        env:
          MOODLELENS_SIGN_IDENTITY: ${{ secrets.MOODLELENS_SIGN_IDENTITY }}
          MOODLELENS_NOTARY_PROFILE: ${{ secrets.MOODLELENS_NOTARY_PROFILE }}
          MOODLELENS_NOTARY_KEY: ${{ secrets.MOODLELENS_NOTARY_KEY }}
          MOODLELENS_NOTARY_KEY_ID: ${{ secrets.MOODLELENS_NOTARY_KEY_ID }}
          MOODLELENS_NOTARY_ISSUER: ${{ secrets.MOODLELENS_NOTARY_ISSUER }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          scripts/package-share.sh "$VERSION"
          hdiutil verify "dist/MoodleLens-${VERSION}-macos.dmg"
          if [ -z "${SPARKLE_PRIVATE_KEY}" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is required to publish in-app updates." >&2
            exit 1
          fi
          scripts/generate-appcast.sh "$VERSION"
          if [ -z "${MOODLELENS_SIGN_IDENTITY}${MOODLELENS_NOTARY_PROFILE}" ]; then
            printf '\n\nNote: this DMG is ad-hoc signed and not notarized. macOS may require Control-click -> Open on first launch, and Privacy permissions may need a fresh grant after each rebuilt app.\n' >> changelog.md
          elif [ -z "${MOODLELENS_NOTARY_PROFILE}${MOODLELENS_NOTARY_KEY}" ]; then
            printf '\n\nNote: this DMG is signed but not notarized. Privacy permissions should persist across updates with the same signing identity, but public Gatekeeper UX still requires notarization.\n' >> changelog.md
          fi
          printf '\n\nNative Sparkle updates are available from this release onward.\n' >> changelog.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: MoodleLens ${{ github.ref_name }}
          body_path: changelog.md
          draft: false
          prerelease: false
          files: |
            dist/MoodleLens-${{ github.ref_name }}-macos.dmg
            dist/MoodleLens-${{ github.ref_name }}-sparkle.zip
            dist/appcast.xml
